name: AI Intelligence Hub - Update Intelligence

on:
  # 定時執行：每日台北時間早上 9 點 (UTC 1:00)
  schedule:
    - cron: '0 1 * * *'

  # 手動觸發
  workflow_dispatch:
    inputs:
      use_ai:
        description: '使用 OpenAI API 生成 AI 分析'
        required: false
        type: boolean
        default: false
      sources:
        description: '新聞來源 (techcrunch, venturebeat)'
        required: false
        default: 'techcrunch,venturebeat'
      limit:
        description: '每個來源最多獲取的文章數'
        required: false
        default: '3'

jobs:
  update-intelligence:
    runs-on: ubuntu-latest

    steps:
      - name: 檢出代碼庫
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 設置 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安裝依賴
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 openai pyyaml

      - name: 配置 Git
        run: |
          git config --global user.name "AI Intelligence Hub"
          git config --global user.email "ai-intelligence-hub@users.noreply.github.com"

      - name: 執行新聞爬蟲與分析
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          USE_AI="${{ inputs.use_ai || false }}"
          SOURCES="${{ inputs.sources || 'techcrunch,venturebeat' }}"
          LIMIT="${{ inputs.limit || '3' }}"
          
          # 轉換逗號分隔的字串為參數
          SOURCE_ARGS=""
          IFS=',' read -ra SOURCES_ARRAY <<< "$SOURCES"
          for source in "${SOURCES_ARRAY[@]}"; do
            SOURCE_ARGS="$SOURCE_ARGS -s ${source// /}"
          done
          
          # 執行爬蟲腳本
          if [ "$USE_AI" = "true" ]; then
            echo "使用 AI 分析模式..."
            python scripts/scrape_ai_jumpnews.py $SOURCE_ARGS -l $LIMIT --use-ai
          else
            echo "使用基本爬蟲模式..."
            python scripts/scrape_ai_jumpnews.py $SOURCE_ARGS -l $LIMIT
          fi

      - name: 檢查是否有新文章
        id: check_changes
        run: |
          if [ -n "$(git status --porcelain _posts/)" ]; then
            echo "new_articles=true" >> $GITHUB_OUTPUT
            echo "發現新文章，準備提交..."
            git status _posts/
          else
            echo "new_articles=false" >> $GITHUB_OUTPUT
            echo "沒有新文章"
          fi

      - name: 提交新文章
        if: steps.check_changes.outputs.new_articles == 'true'
        run: |
          git add _posts/
          git status
          git commit -m "🤖 更新 AI 情報 $(date +'%Y-%m-%d')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 構建 Jekyll 站點
        if: steps.check_changes.outputs.new_articles == 'true'
        run: |
          gem install jekyll jekyll-seo-tag jekyll-sitemap
          jekyll build

      - name: 部署到 GitHub Pages
        if: steps.check_changes.outputs.new_articles == 'true'
        run: |
          ls -la _site/

  health-check:
    runs-on: ubuntu-latest
    needs: update-intelligence
    
    steps:
      - name: 檢查文章數量
        run: |
          echo "越新完成！"
          echo "AI Intelligence Hub 會定期更新最新 AI 行業情報。"
